<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>테스트</title>
  <style>
    body { background: #0f172a; color: #38bdf8; font-size: 24px; padding: 40px; }
  </style>
</head>
<body>
  <h1>✅ 페이지 로딩 성공!</h1>
  <p id="msg">React 로딩 중...</p>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script>
    document.getElementById("msg").textContent = 
      typeof React !== "undefined" ? "✅ React 로딩 성공!" : "❌ React 실패";
  </script>
</body>
</html>
