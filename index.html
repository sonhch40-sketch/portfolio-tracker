<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>포트폴리오 트래커</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.8.0/umd/Recharts.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#0f172a; color:#e2e8f0; font-family:system-ui,sans-serif; font-size:14px; overscroll-behavior:none; }
    input,select,textarea { outline:none; font-family:inherit; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:#1e293b; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { PieChart, Pie, Cell, LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

const COLORS = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#f97316","#84cc16"];
const CASH_COLOR = "#6b7280";
const fmtN = (n,d=2) => Number(n).toLocaleString("ko-KR",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtKRW = n => `₩${fmtN(n,0)}`;
const fmtUSD = n => `$${fmtN(n)}`;
const todayStr = () => new Date().toISOString().slice(0,10);
const defaultSettings = { commissionRate:0.25, exchangeRate:1350 };
const IS = { width:"100%", background:"#0f172a", border:"1px solid #334155", borderRadius:6, color:"#e2e8f0", padding:"8px 10px", fontSize:13, boxSizing:"border-box" };

function load(key, def) { try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; } catch { return def; } }

// ── 미래에셋 파싱 ──
function parseMiraeAsset(text) {
  // 체결 알림
  if (text.includes("체결") && text.includes("미래에셋")) {
    const tickerMatch = text.match(/종목명\s*:\s*[^\(]*\(([A-Z0-9]{1,5})\)/i);
    const typeMatch   = text.match(/매매구분\s*:\s*(매수|매도)/);
    const qtyMatch    = text.match(/체결수량\s*:\s*([\d,]+)\s*주/);
    const priceMatch  = text.match(/체결단가\s*:\s*USD\s*([\d,\.]+)/i);
    if (tickerMatch && typeMatch && qtyMatch && priceMatch) {
      return {
        type: "trade",
        ticker: tickerMatch[1].toUpperCase(),
        tradeType: typeMatch[1] === "매수" ? "buy" : "sell",
        qty: parseFloat(qtyMatch[1].replace(/,/g,"")),
        price: parseFloat(priceMatch[1].replace(/,/g,"")),
        date: todayStr(),
        memo: text.includes("전량체결") ? "전량체결" : "일부체결"
      };
    }
  }
  // 배당 알림
  if (text.includes("배당") && text.includes("미래에셋")) {
    const tickerMatch = text.match(/종목번호\s*:\s*([A-Z0-9]{1,5})/i);
    const amountMatch = text.match(/USD\s*([\d,\.]+)\s*\(세후\)/i);
    if (tickerMatch && amountMatch) {
      return {
        type: "dividend",
        ticker: tickerMatch[1].toUpperCase(),
        amount: parseFloat(amountMatch[1].replace(/,/g,"")),
        date: todayStr()
      };
    }
  }
  return null;
}

// ── Yahoo Finance 주가 fetch ──
async function fetchPrice(ticker) {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const parsed = JSON.parse(data.contents);
    const price = parsed?.chart?.result?.[0]?.meta?.regularMarketPrice;
    return price ? parseFloat(price) : null;
  } catch { return null; }
}

// ── 환율 fetch ──
async function fetchExchangeRate() {
  try {
    const res = await fetch("https://api.frankfurter.app/latest?from=USD&to=KRW", { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    return data?.rates?.KRW ? Math.round(data.rates.KRW) : null;
  } catch { return null; }
}

// ── 메인 앱 ──
function App() {
  const [tab, setTab] = useState("dashboard");
  const [holdings, setHoldings]   = useState(() => load("pt_h2", []));
  const [trades, setTrades]       = useState(() => load("pt_t2", []));
  const [dividends, setDividends] = useState(() => load("pt_div", []));
  const [cash, setCash]           = useState(() => load("pt_c2", 0));
  const [history, setHistory]     = useState(() => load("pt_hist2", []));
  const [settings, setSettings]   = useState(() => load("pt_s2", defaultSettings));
  const [priceStatus, setPriceStatus] = useState({});
  const [exRate, setExRate]       = useState(null);
  const [exStatus, setExStatus]   = useState("idle");
  const [aiInsight, setAiInsight] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [parseInput, setParseInput] = useState("");
  const [parsedResult, setParsedResult] = useState(null);
  const [showAdd, setShowAdd]     = useState(false);
  const [showCorp, setShowCorp]   = useState(false);
  const [nt, setNt] = useState({ ticker:"", qty:"", price:"", type:"buy", date:todayStr(), commission:0.25, memo:"" });
  const [corp, setCorp] = useState({ ticker:"", type:"split", ratio:"", date:todayStr() });
  const [tvData, setTvData]       = useState("");
  const [copied, setCopied]       = useState(false);
  const [cashInput, setCashInput] = useState("");
  const initialized = useRef(false);

  useEffect(()=>{ localStorage.setItem("pt_h2",  JSON.stringify(holdings));  }, [holdings]);
  useEffect(()=>{ localStorage.setItem("pt_t2",  JSON.stringify(trades));    }, [trades]);
  useEffect(()=>{ localStorage.setItem("pt_div", JSON.stringify(dividends)); }, [dividends]);
  useEffect(()=>{ localStorage.setItem("pt_c2",  JSON.stringify(cash));      }, [cash]);
  useEffect(()=>{ localStorage.setItem("pt_hist2",JSON.stringify(history));  }, [history]);
  useEffect(()=>{ localStorage.setItem("pt_s2",  JSON.stringify(settings));  }, [settings]);

  // 환율 자동 로드
  useEffect(()=>{
    setExStatus("loading");
    fetchExchangeRate().then(r=>{
      if(r){ setExRate(r); setSettings(p=>({...p,exchangeRate:r})); setExStatus("ok"); }
      else { setExRate(settings.exchangeRate); setExStatus("fallback"); }
    });
  },[]);

  // 주가 자동 로드
  const refreshPrices = useCallback(async()=>{
    const tickers = holdings.map(h=>h.ticker);
    if(!tickers.length) return;
    tickers.forEach(t=>setPriceStatus(p=>({...p,[t]:"loading"})));
    for(const ticker of tickers){
      const price = await fetchPrice(ticker);
      if(price){
        setPriceStatus(p=>({...p,[ticker]:"ok"}));
        setHoldings(prev=>prev.map(h=>h.ticker===ticker?{...h,currentPrice:price}:h));
      } else {
        setPriceStatus(p=>({...p,[ticker]:"fail"}));
      }
    }
  }, [holdings.map(h=>h.ticker).join(",")]);

  useEffect(()=>{
    if(!initialized.current && holdings.length>0){
      initialized.current=true;
      refreshPrices();
    }
  },[holdings.length]);

  const er = exRate||settings.exchangeRate;
  const totalStock  = holdings.reduce((s,h)=>s+h.qty*h.currentPrice,0);
  const totalAssets = totalStock+cash;
  const totalPnl    = holdings.reduce((s,h)=>s+(h.currentPrice-h.avgPrice)*h.qty,0);
  const totalCost   = holdings.reduce((s,h)=>s+h.avgPrice*h.qty,0);

  function recHistory(h,c){
    const val = h.reduce((s,x)=>s+x.qty*x.currentPrice,0)+c;
    setHistory(prev=>{
      const d=todayStr();
      return [...prev.filter(p=>p.date!==d),{date:d,value:val}].sort((a,b)=>a.date.localeCompare(b.date));
    });
  }

  function applyTrade(t,hIn,cIn){
    let h=[...hIn], c=cIn;
    const comm=t.price*t.qty*((t.commission||0)/100);
    if(t.type==="buy"){
      const idx=h.findIndex(x=>x.ticker===t.ticker);
      if(idx>=0){
        const nq=h[idx].qty+t.qty;
        const na=(h[idx].avgPrice*h[idx].qty+t.price*t.qty)/nq;
        h[idx]={...h[idx],qty:nq,avgPrice:na};
      } else {
        h.push({ticker:t.ticker,qty:t.qty,avgPrice:t.price,currentPrice:t.price,color:COLORS[h.length%COLORS.length]});
      }
      c-=(t.price*t.qty+comm);
    } else {
      const idx=h.findIndex(x=>x.ticker===t.ticker);
      if(idx>=0){
        h[idx]={...h[idx],qty:h[idx].qty-t.qty};
        if(h[idx].qty<=0) h.splice(idx,1);
        c+=(t.price*t.qty-comm);
      }
    }
    return {h,c};
  }

  function addTrade(t){
    const {h,c}=applyTrade(t,holdings,cash);
    setHoldings(h); setCash(c);
    setTrades(prev=>[...prev,{...t,id:Date.now()}]);
    recHistory(h,c);
  }

  function addDividend(ticker,amount,date){
    setDividends(prev=>[...prev,{id:Date.now(),ticker,amount,date}]);
    setCash(prev=>prev+amount);
    recHistory(holdings,cash+amount);
  }

  // 미래에셋 알림 파싱
  function handleParse(){
    const r=parseMiraeAsset(parseInput);
    if(r) setParsedResult(r);
    else  setParsedResult({error:true});
  }

  function confirmParsed(){
    if(!parsedResult||parsedResult.error) return;
    if(parsedResult.type==="trade"){
      addTrade({ticker:parsedResult.ticker,qty:parsedResult.qty,price:parsedResult.price,type:parsedResult.tradeType,date:parsedResult.date,commission:settings.commissionRate,memo:parsedResult.memo});
    } else if(parsedResult.type==="dividend"){
      addDividend(parsedResult.ticker,parsedResult.amount,parsedResult.date);
    }
    setParsedResult(null); setParseInput("");
  }

  function applyCorpEvent(){
    const ratio=parseFloat(corp.ratio);
    if(!ratio||!corp.ticker) return;
    setHoldings(prev=>prev.map(h=>{
      if(h.ticker!==corp.ticker) return h;
      if(corp.type==="split")         return {...h,qty:h.qty*ratio,avgPrice:h.avgPrice/ratio};
      if(corp.type==="consolidation") return {...h,qty:h.qty/ratio,avgPrice:h.avgPrice*ratio};
      if(corp.type==="rights")        return {...h,qty:h.qty+h.qty*ratio};
      return h;
    }));
    setTrades(prev=>[...prev,{id:Date.now(),type:"event",ticker:corp.ticker,eventType:corp.type,ratio,date:corp.date}]);
    setShowCorp(false);
  }

  function genTVData(){
    const lines=trades.filter(t=>t.type==="buy"||t.type==="sell").map(t=>{
      const d=t.date.replace(/-/g,"")+"0930";
      const type=t.type==="buy"?"매수":"매도";
      const memo=(t.memo||"").replace(/,/g,"").replace(/\//g,"");
      return `${t.ticker},${d},${t.price},${t.qty},${type},${memo}`;
    });
    setTvData(lines.join("/"));
  }

  function copyTV(){ navigator.clipboard.writeText(tvData).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); }); }

  async function getAiInsight(){
    setAiLoading(true); setAiInsight("");
    const data={
      holdings:holdings.map(h=>({ticker:h.ticker,qty:h.qty,avgPrice:h.avgPrice,currentPrice:h.currentPrice,pnl:fmtUSD((h.currentPrice-h.avgPrice)*h.qty),pnlPct:((h.currentPrice-h.avgPrice)/h.avgPrice*100).toFixed(2)+"%",weight:totalAssets>0?(h.qty*h.currentPrice/totalAssets*100).toFixed(1)+"%":"0%"})),
      cash:fmtUSD(cash),cashRatio:totalAssets>0?(cash/totalAssets*100).toFixed(1)+"%":"100%",totalAssets:fmtUSD(totalAssets)
    };
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"당신은 주식 포트폴리오 분석 전문가입니다. 한국어로 간결하고 실용적인 인사이트를 제공하세요. 레버리지 ETF 리스크, 집중도, 분산 등을 중심으로 분석하세요.",messages:[{role:"user",content:`포트폴리오 분석:\n${JSON.stringify(data,null,2)}\n\n핵심 리스크, 상태 평가, 개선 제안을 3~5줄로 요약해주세요.`}]})});
      const d=await res.json();
      setAiInsight(d.content?.[0]?.text||"분석 실패");
    }catch(e){ setAiInsight("API 오류: "+e.message); }
    setAiLoading(false);
  }

  function exportData(){
    const blob=new Blob([JSON.stringify({holdings,trades,dividends,cash,history,settings},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`portfolio_${todayStr()}.json`; a.click();
  }
  function importData(e){
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.holdings)  setHoldings(d.holdings);
        if(d.trades)    setTrades(d.trades);
        if(d.dividends) setDividends(d.dividends);
        if(d.cash!==undefined) setCash(d.cash);
        if(d.history)   setHistory(d.history);
        if(d.settings)  setSettings(d.settings);
        alert("✅ 복원 완료!");
      }catch{ alert("❌ 파일 오류"); }
    };
    r.readAsText(f);
  }

  const pieData=[...holdings.map(h=>({name:h.ticker,value:h.qty*h.currentPrice,color:h.color})),{name:"현금",value:cash,color:CASH_COLOR}].filter(d=>d.value>0);
  const tabs=[{id:"dashboard",label:"📊 대시보드"},{id:"trades",label:"📝 매매"},{id:"holdings",label:"💼 보유"},{id:"review",label:"🔍 복기"},{id:"tv",label:"📈 TV"},{id:"settings",label:"⚙️ 설정"}];

  return (
    <div style={{background:"#0f172a",minHeight:"100vh",paddingBottom:20}}>
      {/* Header */}
      <div style={{background:"#1e293b",padding:"12px 16px",borderBottom:"1px solid #334155",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}}>
        <span style={{fontWeight:700,fontSize:16,color:"#38bdf8"}}>📊 포트폴리오 트래커</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:exStatus==="ok"?"#10b981":"#94a3b8",fontSize:11}}>
            {exStatus==="loading"?"로딩..":exStatus==="ok"?`₩${fmtN(er,0)}`:`₩${fmtN(er,0)}`}
          </span>
          <button onClick={refreshPrices} style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11}}>🔄</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",overflowX:"auto",background:"#1e293b",borderBottom:"1px solid #334155",position:"sticky",top:45,zIndex:99}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 14px",background:"none",border:"none",color:tab===t.id?"#38bdf8":"#94a3b8",borderBottom:tab===t.id?"2px solid #38bdf8":"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap",fontSize:13,fontWeight:tab===t.id?600:400}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:16}}>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[
                {label:"총 자산",val:fmtUSD(totalAssets),sub:fmtKRW(totalAssets*er),color:"#38bdf8"},
                {label:"주식 평가액",val:fmtUSD(totalStock),sub:`비중 ${totalAssets>0?(totalStock/totalAssets*100).toFixed(1):0}%`,color:"#10b981"},
                {label:"현금",val:fmtUSD(cash),sub:`비중 ${totalAssets>0?(cash/totalAssets*100).toFixed(1):0}%`,color:"#f59e0b"},
                {label:"총 손익",val:fmtUSD(totalPnl),sub:totalCost>0?`${(totalPnl/totalCost*100).toFixed(2)}%`:"0%",color:totalPnl>=0?"#10b981":"#ef4444"},
              ].map((c,i)=>(
                <div key={i} style={{background:"#1e293b",borderRadius:10,padding:"12px 14px",borderLeft:`3px solid ${c.color}`}}>
                  <div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>{c.label}</div>
                  <div style={{fontWeight:700,fontSize:16,color:c.color}}>{c.val}</div>
                  <div style={{color:"#64748b",fontSize:11}}>{c.sub}</div>
                </div>
              ))}
            </div>

            {pieData.length>0 && (
              <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
                <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:10}}>자산 비중</div>
                <div style={{display:"flex",alignItems:"center",gap:16}}>
                  <ResponsiveContainer width={140} height={140}>
                    <PieChart><Pie data={pieData} cx="50%" cy="50%" innerRadius={38} outerRadius={62} dataKey="value" paddingAngle={2}>
                      {pieData.map((e,i)=><Cell key={i} fill={e.color}/>)}
                    </Pie></PieChart>
                  </ResponsiveContainer>
                  <div style={{flex:1}}>
                    {pieData.map((d,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:10,height:10,borderRadius:2,background:d.color}}/>
                          <span style={{color:"#cbd5e1",fontSize:13}}>{d.name}</span>
                        </div>
                        <span style={{color:"#94a3b8",fontSize:12}}>{totalAssets>0?(d.value/totalAssets*100).toFixed(1):0}%</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {history.length>1 && (
              <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
                <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:10}}>자산 변화</div>
                <ResponsiveContainer width="100%" height={150}>
                  <LineChart data={history}>
                    <XAxis dataKey="date" tick={{fill:"#64748b",fontSize:10}} tickFormatter={d=>d.slice(5)}/>
                    <YAxis tick={{fill:"#64748b",fontSize:10}} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`}/>
                    <Tooltip formatter={v=>[`$${fmtN(v)}`,"자산"]} contentStyle={{background:"#0f172a",border:"1px solid #334155"}} labelStyle={{color:"#94a3b8"}}/>
                    <Line type="monotone" dataKey="value" stroke="#38bdf8" strokeWidth={2} dot={false}/>
                  </LineChart>
                </ResponsiveContainer>
              </div>
            )}

            {dividends.length>0 && (
              <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
                <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:10}}>💰 최근 배당</div>
                {dividends.slice(-3).reverse().map(d=>(
                  <div key={d.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1e293b"}}>
                    <span style={{color:"#cbd5e1"}}>{d.ticker}</span>
                    <span style={{color:"#10b981"}}>{fmtUSD(d.amount)}</span>
                    <span style={{color:"#64748b",fontSize:12}}>{d.date}</span>
                  </div>
                ))}
              </div>
            )}

            <div style={{background:"#1e293b",borderRadius:10,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontWeight:600,color:"#cbd5e1"}}>🤖 AI 인사이트</span>
                <button onClick={getAiInsight} disabled={aiLoading} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>
                  {aiLoading?"분석 중...":"분석하기"}
                </button>
              </div>
              {aiInsight
                ? <div style={{color:"#94a3b8",lineHeight:1.7,fontSize:13,whiteSpace:"pre-wrap"}}>{aiInsight}</div>
                : <div style={{color:"#475569",fontSize:13}}>포트폴리오 입력 후 AI 분석을 실행해보세요.</div>}
            </div>
          </div>
        )}

        {/* ── TRADES ── */}
        {tab==="trades" && (
          <div>
            {/* 미래에셋 파싱 */}
            <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
              <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:4}}>📱 미래에셋 알림 파싱</div>
              <div style={{color:"#64748b",fontSize:12,marginBottom:10}}>체결(전량/일부) · 배당 알림 모두 지원</div>
              <textarea value={parseInput} onChange={e=>setParseInput(e.target.value)}
                placeholder={"[미래에셋증권] 전량체결\n계좌번호 : ...\n종목명 : DIREXION TSLA DA(TSLL)\n..."}
                style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:6,color:"#e2e8f0",padding:10,fontSize:12,minHeight:90,resize:"vertical",boxSizing:"border-box"}}/>
              <button onClick={handleParse} style={{marginTop:8,background:"#10b981",color:"#fff",border:"none",borderRadius:6,padding:"8px 16px",cursor:"pointer",fontSize:13}}>파싱하기</button>
              {parsedResult && !parsedResult.error && (
                <div style={{marginTop:10,background:"#0f172a",borderRadius:6,padding:12,border:"1px solid #10b981"}}>
                  <div style={{color:"#10b981",fontWeight:600,marginBottom:6}}>✅ 파싱 결과</div>
                  {parsedResult.type==="trade" && (
                    <div style={{color:"#cbd5e1",fontSize:13}}>{parsedResult.tradeType==="buy"?"🔵 매수":"🔴 매도"} | {parsedResult.ticker} | {parsedResult.qty}주 | ${parsedResult.price} | {parsedResult.memo}</div>
                  )}
                  {parsedResult.type==="dividend" && (
                    <div style={{color:"#cbd5e1",fontSize:13}}>💰 배당 | {parsedResult.ticker} | 세후 {fmtUSD(parsedResult.amount)}</div>
                  )}
                  <button onClick={confirmParsed} style={{marginTop:8,background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>적용</button>
                </div>
              )}
              {parsedResult?.error && <div style={{marginTop:8,color:"#ef4444",fontSize:13}}>❌ 파싱 실패 — 직접 입력을 이용해주세요.</div>}
            </div>

            {/* 직접 입력 */}
            <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontWeight:600,color:"#cbd5e1"}}>✏️ 직접 입력</span>
                <button onClick={()=>setShowAdd(!showAdd)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>{showAdd?"닫기":"+ 추가"}</button>
              </div>
              {showAdd && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>티커</div>
                    <input value={nt.ticker} placeholder="TSLL" onChange={e=>setNt(p=>({...p,ticker:e.target.value.toUpperCase()}))} style={IS}/></div>
                  <div><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>수량</div>
                    <input type="number" value={nt.qty} placeholder="100" onChange={e=>setNt(p=>({...p,qty:e.target.value}))} style={IS}/></div>
                  <div><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>단가($)</div>
                    <input type="number" value={nt.price} placeholder="12.34" onChange={e=>setNt(p=>({...p,price:e.target.value}))} style={IS}/></div>
                  <div><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>수수료(%)</div>
                    <input type="number" value={nt.commission} placeholder="0.25" onChange={e=>setNt(p=>({...p,commission:e.target.value}))} style={IS}/></div>
                  <div style={{gridColumn:"1/-1"}}><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>날짜</div>
                    <input type="date" value={nt.date} onChange={e=>setNt(p=>({...p,date:e.target.value}))} style={IS}/></div>
                  <div style={{gridColumn:"1/-1"}}>
                    <div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>유형</div>
                    <div style={{display:"flex",gap:8}}>
                      {["buy","sell"].map(type=>(
                        <button key={type} onClick={()=>setNt(p=>({...p,type}))} style={{flex:1,padding:8,border:"none",borderRadius:6,cursor:"pointer",background:nt.type===type?(type==="buy"?"#3b82f6":"#ef4444"):"#334155",color:"#fff",fontSize:13}}>
                          {type==="buy"?"🔵 매수":"🔴 매도"}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div style={{gridColumn:"1/-1"}}><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>메모</div>
                    <input value={nt.memo} placeholder="매매 메모..." onChange={e=>setNt(p=>({...p,memo:e.target.value}))} style={IS}/></div>
                  <div style={{gridColumn:"1/-1"}}>
                    <button onClick={()=>{
                      if(!nt.ticker||!nt.qty||!nt.price) return;
                      addTrade({...nt,qty:parseFloat(nt.qty),price:parseFloat(nt.price),commission:parseFloat(nt.commission)});
                      setShowAdd(false); setNt({ticker:"",qty:"",price:"",type:"buy",date:todayStr(),commission:settings.commissionRate,memo:""});
                    }} style={{width:"100%",background:"#10b981",color:"#fff",border:"none",borderRadius:6,padding:10,cursor:"pointer",fontSize:14,fontWeight:600}}>✅ 추가</button>
                  </div>
                </div>
              )}
            </div>

            {/* 감자/증자 */}
            <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontWeight:600,color:"#cbd5e1"}}>🏢 감자 / 증자 / 분할</span>
                <button onClick={()=>setShowCorp(!showCorp)} style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>{showCorp?"닫기":"+ 이벤트"}</button>
              </div>
              {showCorp && (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>티커</div>
                    <input value={corp.ticker} onChange={e=>setCorp(p=>({...p,ticker:e.target.value.toUpperCase()}))} style={IS}/></div>
                  <div><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>유형</div>
                    <select value={corp.type} onChange={e=>setCorp(p=>({...p,type:e.target.value}))} style={IS}>
                      <option value="split">주식 분할</option>
                      <option value="consolidation">감자 (병합)</option>
                      <option value="rights">무상증자</option>
                    </select>
                  </div>
                  <div><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>비율</div>
                    <input type="number" value={corp.ratio} placeholder="2" onChange={e=>setCorp(p=>({...p,ratio:e.target.value}))} style={IS}/></div>
                  <div><div style={{color:"#94a3b8",fontSize:11,marginBottom:4}}>날짜</div>
                    <input type="date" value={corp.date} onChange={e=>setCorp(p=>({...p,date:e.target.value}))} style={IS}/></div>
                  <div style={{gridColumn:"1/-1"}}>
                    <button onClick={applyCorpEvent} style={{width:"100%",background:"#f59e0b",color:"#000",border:"none",borderRadius:6,padding:10,cursor:"pointer",fontSize:14,fontWeight:600}}>적용</button>
                  </div>
                </div>
              )}
            </div>

            {/* 현금 */}
            <div style={{background:"#1e293b",borderRadius:10,padding:16}}>
              <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:10}}>💵 현금 잔고</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input type="number" value={cashInput||cash} onChange={e=>setCashInput(e.target.value)}
                  onBlur={()=>{if(cashInput!==""){setCash(parseFloat(cashInput)||0);setCashInput("");}}}
                  style={{flex:1,background:"#0f172a",border:"1px solid #334155",borderRadius:6,color:"#e2e8f0",padding:"8px 10px",fontSize:13}}/>
                <span style={{color:"#94a3b8"}}>USD</span>
                <span style={{color:"#64748b",fontSize:12}}>{fmtKRW((parseFloat(cashInput)||cash)*er)}</span>
              </div>
            </div>
          </div>
        )}

        {/* ── HOLDINGS ── */}
        {tab==="holdings" && (
          <div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
              <button onClick={refreshPrices} style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>🔄 시세 새로고침</button>
            </div>
            {holdings.length===0
              ? <div style={{color:"#475569",textAlign:"center",padding:40}}>보유 종목이 없습니다.</div>
              : holdings.map(h=>{
                const pnl=(h.currentPrice-h.avgPrice)*h.qty;
                const pnlPct=((h.currentPrice-h.avgPrice)/h.avgPrice*100);
                const isUp=pnl>=0;
                const st=priceStatus[h.ticker];
                return (
                  <div key={h.ticker} style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:12,borderLeft:`3px solid ${h.color}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontWeight:700,fontSize:16,color:"#e2e8f0"}}>{h.ticker}</span>
                        <span style={{fontSize:11,color:st==="ok"?"#10b981":st==="loading"?"#f59e0b":"#64748b",background:"#0f172a",padding:"2px 6px",borderRadius:4}}>
                          {st==="ok"?"● 실시간":st==="loading"?"● 로딩중":"● 수동"}
                        </span>
                      </div>
                      <span style={{color:isUp?"#10b981":"#ef4444",fontWeight:600}}>{isUp?"+":""}{fmtUSD(pnl)} ({isUp?"+":""}{pnlPct.toFixed(2)}%)</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,fontSize:12}}>
                      <div><div style={{color:"#64748b"}}>수량</div><div style={{color:"#cbd5e1"}}>{h.qty}주</div></div>
                      <div><div style={{color:"#64748b"}}>평단가</div><div style={{color:"#f59e0b"}}>{fmtUSD(h.avgPrice)}</div></div>
                      <div><div style={{color:"#64748b"}}>현재가</div>
                        <input type="number" value={h.currentPrice} onChange={e=>setHoldings(prev=>prev.map(x=>x.ticker===h.ticker?{...x,currentPrice:parseFloat(e.target.value)||x.currentPrice}:x))} style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:4,color:"#38bdf8",padding:"3px 6px",fontSize:12}}/>
                      </div>
                      <div><div style={{color:"#64748b"}}>평가액</div><div style={{color:"#cbd5e1"}}>{fmtUSD(h.qty*h.currentPrice)}</div></div>
                      <div><div style={{color:"#64748b"}}>원화</div><div style={{color:"#94a3b8"}}>{fmtKRW(h.qty*h.currentPrice*er)}</div></div>
                      <div><div style={{color:"#64748b"}}>비중</div><div style={{color:"#94a3b8"}}>{totalAssets>0?(h.qty*h.currentPrice/totalAssets*100).toFixed(1):0}%</div></div>
                    </div>
                    {/* 배당 수령 내역 */}
                    {dividends.filter(d=>d.ticker===h.ticker).length>0 && (
                      <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #334155"}}>
                        <div style={{color:"#64748b",fontSize:11,marginBottom:4}}>배당 수령</div>
                        {dividends.filter(d=>d.ticker===h.ticker).map(d=>(
                          <div key={d.id} style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                            <span style={{color:"#10b981"}}>{fmtUSD(d.amount)}</span>
                            <span style={{color:"#64748b"}}>{d.date}</span>
                          </div>
                        ))}
                        <div style={{color:"#10b981",fontSize:12,marginTop:4}}>합계 {fmtUSD(dividends.filter(d=>d.ticker===h.ticker).reduce((s,d)=>s+d.amount,0))}</div>
                      </div>
                    )}
                  </div>
                );
              })}
          </div>
        )}

        {/* ── REVIEW ── */}
        {tab==="review" && (
          <div>
            {holdings.length>0 && (
              <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
                <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:10}}>📌 종목 요약</div>
                {holdings.map(h=>{
                  const myTrades=trades.filter(t=>t.ticker===h.ticker&&(t.type==="buy"||t.type==="sell"));
                  const buys=myTrades.filter(t=>t.type==="buy");
                  const sells=myTrades.filter(t=>t.type==="sell");
                  const totalBuy=buys.reduce((s,t)=>s+t.price*t.qty,0);
                  const totalSell=sells.reduce((s,t)=>s+t.price*t.qty,0);
                  const totalDiv=dividends.filter(d=>d.ticker===h.ticker).reduce((s,d)=>s+d.amount,0);
                  return (
                    <div key={h.ticker} style={{background:"#0f172a",borderRadius:8,padding:14,marginBottom:10,borderLeft:`3px solid ${h.color}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                        <span style={{fontWeight:700,color:"#e2e8f0",fontSize:15}}>{h.ticker}</span>
                        <span style={{color:"#94a3b8",fontSize:12}}>매수 {buys.length}회 | 매도 {sells.length}회</span>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:12}}>
                        <div><span style={{color:"#64748b"}}>보유 </span><span style={{color:"#cbd5e1"}}>{h.qty}주</span></div>
                        <div><span style={{color:"#64748b"}}>평단 </span><span style={{color:"#f59e0b"}}>{fmtUSD(h.avgPrice)}</span></div>
                        <div><span style={{color:"#64748b"}}>총 매수금 </span><span style={{color:"#cbd5e1"}}>{fmtUSD(totalBuy)}</span></div>
                        <div><span style={{color:"#64748b"}}>총 매도금 </span><span style={{color:"#cbd5e1"}}>{fmtUSD(totalSell)}</span></div>
                        <div><span style={{color:"#64748b"}}>미실현 </span><span style={{color:(h.currentPrice-h.avgPrice)*h.qty>=0?"#10b981":"#ef4444"}}>{fmtUSD((h.currentPrice-h.avgPrice)*h.qty)}</span></div>
                        {totalDiv>0 && <div><span style={{color:"#64748b"}}>배당 수령 </span><span style={{color:"#10b981"}}>{fmtUSD(totalDiv)}</span></div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:10}}>🗂 전체 이력</div>
            {trades.length===0 && dividends.length===0
              ? <div style={{color:"#475569",textAlign:"center",padding:30}}>내역이 없습니다.</div>
              : [...trades, ...dividends.map(d=>({...d,type:"dividend"}))].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>(
                <div key={t.id} style={{background:"#1e293b",borderRadius:10,padding:14,marginBottom:10,borderLeft:`3px solid ${t.type==="buy"?"#3b82f6":t.type==="sell"?"#ef4444":t.type==="dividend"?"#10b981":"#f59e0b"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontWeight:600,color:"#e2e8f0"}}>{t.ticker||"이벤트"}</span>
                    <span style={{color:"#64748b",fontSize:12}}>{t.date}</span>
                  </div>
                  {t.type==="buy"&&<div style={{fontSize:13,color:"#94a3b8"}}>🔵 매수 | {t.qty}주 | ${t.price} | 수수료 {t.commission}%</div>}
                  {t.type==="sell"&&<div style={{fontSize:13,color:"#94a3b8"}}>🔴 매도 | {t.qty}주 | ${t.price} | 수수료 {t.commission}%</div>}
                  {t.type==="dividend"&&<div style={{fontSize:13,color:"#10b981"}}>💰 배당 | 세후 {fmtUSD(t.amount)}</div>}
                  {t.type==="event"&&<div style={{fontSize:13,color:"#f59e0b"}}>🏢 {t.eventType} | 비율 {t.ratio}</div>}
                  {t.memo&&<div style={{marginTop:6,fontSize:12,color:"#475569",fontStyle:"italic"}}>📝 {t.memo}</div>}
                </div>
              ))}
          </div>
        )}

        {/* ── TRADINGVIEW ── */}
        {tab==="tv" && (
          <div>
            <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
              <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:10}}>📈 TradingView 연동</div>
              <div style={{color:"#94a3b8",fontSize:13,lineHeight:1.7,marginBottom:14}}>
                <span style={{color:"#f59e0b"}}>TradeLog Bridge</span> 인디케이터 설정창의 <span style={{color:"#38bdf8"}}>📋 앱 데이터 붙여넣기</span>에 복사한 데이터를 붙여넣으세요.
              </div>
              <button onClick={genTVData} style={{background:"#38bdf8",color:"#0f172a",border:"none",borderRadius:6,padding:"10px 20px",cursor:"pointer",fontSize:14,fontWeight:600}}>데이터 생성</button>
              {tvData && (
                <div style={{background:"#0f172a",borderRadius:8,padding:12,marginTop:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{color:"#94a3b8",fontSize:12}}>생성된 데이터 ({trades.filter(t=>t.type==="buy"||t.type==="sell").length}건)</span>
                    <button onClick={copyTV} style={{background:copied?"#10b981":"#334155",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12}}>
                      {copied?"✅ 복사됨":"📋 복사"}
                    </button>
                  </div>
                  <pre style={{color:"#10b981",fontSize:11,overflowX:"auto",whiteSpace:"pre-wrap",margin:0,maxHeight:200}}>{tvData}</pre>
                </div>
              )}
            </div>

            {holdings.length>0 && (
              <div style={{background:"#1e293b",borderRadius:10,padding:16}}>
                <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:10}}>📌 종목별 요약</div>
                {holdings.map(h=>{
                  const myTrades=trades.filter(t=>t.ticker===h.ticker&&(t.type==="buy"||t.type==="sell"));
                  return (
                    <div key={h.ticker} style={{background:"#0f172a",borderRadius:8,padding:14,marginBottom:10,borderLeft:`3px solid ${h.color}`}}>
                      <div style={{fontWeight:700,color:"#e2e8f0",fontSize:15,marginBottom:6}}>{h.ticker}</div>
                      <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.9}}>
                        보유 <span style={{color:"#cbd5e1"}}>{h.qty}주</span> · 평단 <span style={{color:"#f59e0b"}}>{fmtUSD(h.avgPrice)}</span> · 현재 <span style={{color:"#38bdf8"}}>{fmtUSD(h.currentPrice)}</span><br/>
                        매매 <span style={{color:"#cbd5e1"}}>{myTrades.length}회</span> · 미실현 <span style={{color:(h.currentPrice-h.avgPrice)>=0?"#10b981":"#ef4444"}}>{fmtUSD((h.currentPrice-h.avgPrice)*h.qty)}</span><br/>
                        평단선 <span style={{color:"#f59e0b"}}>dashed @ {fmtUSD(h.avgPrice)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── SETTINGS ── */}
        {tab==="settings" && (
          <div>
            <div style={{background:"#1e293b",borderRadius:10,padding:16,marginBottom:16}}>
              <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:12}}>⚙️ 기본 설정</div>
              <div style={{marginBottom:12}}>
                <div style={{color:"#94a3b8",fontSize:12,marginBottom:4}}>기본 수수료율 (%)</div>
                <input type="number" value={settings.commissionRate} onChange={e=>setSettings(p=>({...p,commissionRate:parseFloat(e.target.value)}))} style={IS}/>
              </div>
              <div>
                <div style={{color:"#94a3b8",fontSize:12,marginBottom:4}}>환율 (KRW/USD) <span style={{color:exStatus==="ok"?"#10b981":"#64748b",fontSize:11}}>{exStatus==="ok"?"● 자동":"● 수동"}</span></div>
                <input type="number" value={er} onChange={e=>setSettings(p=>({...p,exchangeRate:parseFloat(e.target.value)}))} style={IS}/>
              </div>
            </div>
            <div style={{background:"#1e293b",borderRadius:10,padding:16}}>
              <div style={{fontWeight:600,color:"#cbd5e1",marginBottom:12}}>💾 데이터 백업</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={exportData} style={{flex:1,background:"#10b981",color:"#fff",border:"none",borderRadius:6,padding:10,cursor:"pointer",fontSize:13}}>📤 내보내기</button>
                <label style={{flex:1,background:"#3b82f6",color:"#fff",borderRadius:6,padding:10,cursor:"pointer",fontSize:13,textAlign:"center"}}>
                  📥 불러오기<input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
                </label>
              </div>
              <button onClick={()=>{ if(window.confirm("모든 데이터를 삭제할까요?")){setHoldings([]);setTrades([]);setDividends([]);setCash(0);setHistory([]);} }}
                style={{width:"100%",marginTop:10,background:"#ef4444",color:"#fff",border:"none",borderRadius:6,padding:10,cursor:"pointer",fontSize:13}}>🗑️ 전체 초기화</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js'); });
}
</script>
</body>
